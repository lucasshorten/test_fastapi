<!--
  PROTOTYPE JETABLE — ne pas garder en l'état.

  Version dédiée à la seule variante I (tableau de bord modulaire + rail de
  navigation), extraite de prototype-dossier-patient.html une fois ce choix
  définitivement retenu. Pas de switcher de variantes ici — c'est la version
  "propre" à montrer, pas l'outil de comparaison.

  Ajustements propres à ce fichier par rapport à la version multi-variantes :
    - Recherche de contenu (barre de gauche) agrandie : police et bascule
      "Ce séjour" / "Tout le dossier" plus lisibles.
    - Chaque case du bandeau des séjours affiche désormais un identifiant de
      séjour (ex: ID0000123), en plus des dates/service.

  Données 100% fictives et anonymisées (identifiants d'étude, pas de noms/dates
  de naissance réelles) — ce sont des dossiers "recherche".
  Aucune persistance : tout ne vit qu'en mémoire (state JS).
-->
<meta charset="UTF-8">
<title>Prototype — Dossier patient recherche + codage (variante I)</title>
<style>
  :root {
    --bg: #f4f6f8;
    --panel: #ffffff;
    --border: #dfe4e8;
    --text: #1c2b36;
    --muted: #64748b;
    --accent: #2563eb;
    --accent-soft: #eaf1ff;
    --green: #16a34a;
    --green-soft: #eafaf0;
    --orange: #d97706;
    --orange-soft: #fef3e2;
    --red: #dc2626;
    --red-soft: #fdecec;
    --gray-soft: #eef0f2;
    --mono: "SFMono-Regular", Consolas, monospace;
    --shadow-sm: 0 1px 2px rgba(16,24,32,.06);
    --shadow-md: 0 8px 24px rgba(16,24,32,.12);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    font-size: 14px;
  }
  #app { min-height: 100vh; }
  h1, h2, h3, h4 { margin: 0; font-weight: 600; }
  button { font-family: inherit; cursor: pointer; }
  mark { background: #fff1a8; padding: 0 2px; border-radius: 2px; }

  /* ---------- barre supérieure : recherche + identité patient ---------- */
  .topbar { padding: 9px 20px; color: #fff; }
  .topbar-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap; }

  .content-search-wrap { position: relative; display: flex; align-items: center; gap: 8px; flex: 1 1 380px; max-width: 540px; margin-top: 2px; }
  .content-search-wrap .icon { font-size: 16px; color: #fff; opacity: .9; }
  .content-search-wrap input { flex: 1; min-width: 0; padding: 10px 14px; border-radius: 999px; border: none; background: rgba(255,255,255,.95); font-size: 14px; font-family: inherit; }
  .content-search-wrap .search-dropdown { left: 30px; right: 0; }
  .scope-toggle { display: flex; background: rgba(255,255,255,.25); border-radius: 999px; padding: 3px; flex-shrink: 0; }
  .scope-btn { border: none; background: none; color: #fff; font-size: 12.5px; font-weight: 700; padding: 7px 14px; border-radius: 999px; white-space: nowrap; opacity: .85; }
  .scope-btn.active { background: #fff; color: var(--text); opacity: 1; }

  .search-dropdown { position: absolute; top: calc(100% + 6px); background: #fff; border-radius: 12px; box-shadow: var(--shadow-md); overflow: hidden; z-index: 60; max-height: 320px; overflow-y: auto; width: 320px; }
  .search-result { display: flex; align-items: center; gap: 10px; padding: 9px 12px; cursor: pointer; color: var(--text); }
  .search-result:hover, .search-result.current { background: var(--gray-soft); }
  .sr-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .sr-title { font-size: 12.5px; font-weight: 600; }
  .sr-meta { font-size: 11px; color: var(--muted); font-weight: 400; }
  .search-empty { padding: 14px; text-align: center; color: var(--muted); font-size: 12.5px; }

  .topbar-end { display: flex; align-items: flex-start; gap: 16px; flex: 0 0 auto; }
  .account-badge { display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,.14); border-radius: 999px; padding: 5px 6px 5px 12px; margin-top: 1px; }
  .ab-info { display: flex; flex-direction: column; line-height: 1.25; }
  .ab-name { font-weight: 700; font-size: 12px; }
  .ab-role { font-size: 10px; opacity: .8; }
  .ab-btn { width: 25px; height: 25px; border-radius: 50%; border: none; background: rgba(255,255,255,.25); color: #fff; font-size: 12.5px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; flex-shrink: 0; }
  .ab-btn:hover { background: rgba(255,255,255,.4); }
  .topbar-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex: 0 0 auto; }
  .patient-nav { display: flex; align-items: center; gap: 7px; }
  .patient-nav-btn { width: 24px; height: 24px; border-radius: 50%; border: none; background: rgba(255,255,255,.25); color: #fff; font-size: 11px; flex-shrink: 0; }
  .patient-nav-btn:hover { background: rgba(255,255,255,.4); }
  .topbar-patient { display: flex; align-items: center; gap: 8px; }
  .tp-avatar { width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 11px; flex-shrink: 0; }
  .tp-id { font-weight: 700; font-size: 12.5px; }
  .tp-service { font-size: 11px; opacity: .95; }
  .tp-meta { font-weight: 400; opacity: .85; font-size: 10.5px; }

  .patient-search-inline { position: relative; display: flex; align-items: center; gap: 6px; }
  .psi-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(255,255,255,.5); }
  .patient-search-inline input { width: 220px; padding: 5px 10px; border-radius: 999px; border: none; background: rgba(255,255,255,.9); font-size: 11px; font-family: inherit; }
  .patient-search-inline .search-dropdown { top: calc(100% + 6px); right: 0; left: auto; width: 280px; }

  /* ---------- bandeau des séjours ---------- */
  .sejours-bar { display: flex; gap: 10px; padding: 10px 20px 14px; background: var(--panel); border-bottom: 1px solid var(--border); overflow-x: auto; }
  .sejour-card { min-width: 170px; border: 2px solid var(--border); border-radius: 10px; padding: 9px 12px; cursor: pointer; background: #fff; flex-shrink: 0; }
  .sejour-card:hover { border-color: #c7d2e0; }
  .sejour-card.active { border-color: var(--accent); background: var(--accent-soft); box-shadow: var(--shadow-sm); }
  .sc-id { font-family: var(--mono); font-weight: 700; font-size: 11px; color: var(--accent); }
  .sc-date { font-size: 10.5px; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
  .sc-service { font-size: 12.5px; font-weight: 700; margin-top: 2px; }

  /* ---------- rail de navigation (module actif du tableau de bord) ---------- */
  .nav-rail { width: 96px; flex: 0 0 96px; height: calc(100vh - 190px); background: var(--panel); border-right: 1px solid var(--border); padding: 14px 0; display: flex; flex-direction: column; gap: 2px; }
  .rail-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 10px 4px; cursor: pointer; color: var(--muted); font-size: 10.5px; }
  .rail-item .ri-icon { font-size: 18px; }
  .rail-item:hover { background: var(--gray-soft); }
  .rail-item.active { color: var(--accent); background: var(--accent-soft); box-shadow: inset 3px 0 0 var(--accent); }
  .H-main { display: flex; gap: 0; }
  .H-content { flex: 1 1 auto; min-width: 0; height: calc(100vh - 190px); overflow-y: auto; }

  .tab-panel { padding: 18px 20px; }
  .resume-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px 20px; margin-bottom: 6px; }
  .rg-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; }
  .rg-value { font-size: 13px; margin-top: 2px; }

  table.datatable { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  table.datatable th, table.datatable td { text-align: left; padding: 6px 9px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.datatable th { color: var(--muted); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .02em; }

  .doc-title { font-weight: 600; font-size: 13.5px; }
  .doc-meta { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .doc-excerpt { font-size: 13px; line-height: 1.55; color: #33424d; white-space: pre-wrap; }

  .doc-subtabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .doc-subtab { border: 1px solid var(--border); background: var(--panel); border-radius: 999px; padding: 6px 12px; font-size: 12px; font-weight: 600; color: var(--muted); }
  .doc-subtab:hover:not(.active) { background: var(--gray-soft); }
  .doc-subtab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .acc-item { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .acc-header { width: 100%; display: flex; align-items: baseline; gap: 10px; padding: 12px 14px; background: none; border: none; text-align: left; cursor: pointer; font-family: inherit; }
  .acc-header:hover { background: var(--gray-soft); }
  .acc-caret { color: var(--muted); font-size: 10px; flex-shrink: 0; width: 10px; }
  .acc-title { font-weight: 600; font-size: 13.5px; }
  .acc-meta { color: var(--muted); font-size: 12px; margin-left: auto; white-space: nowrap; padding-left: 10px; }
  .acc-body { padding: 0 14px 14px; border-top: 1px solid var(--border); padding-top: 10px; }
  .acc-body .doc-meta { margin-bottom: 6px; }

  .fiche-form { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 10px; margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
  .fiche-field label { display: block; font-size: 10.5px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); font-weight: 700; margin-bottom: 3px; }
  .fiche-value { font-size: 13px; background: var(--gray-soft); border-radius: 6px; padding: 6px 9px; border: 1px solid var(--border); white-space: pre-wrap; }

  /* ---------- documents/fiches/observations hors séjour ---------- */
  .hors-sejour-box { border: 1px dashed var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 14px; background: #fbfcfe; }
  .hors-sejour-head { font-size: 11.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 8px; }
  .hors-sejour-head .hs-meta { font-weight: 400; text-transform: none; letter-spacing: normal; }

  .marker-row { font-size: 12.5px; margin: 4px 0; display: flex; align-items: center; gap: 6px; }
  .marker-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .code-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--gray-soft); border-radius: 999px; padding: 4px 10px; font-size: 12.5px; margin: 3px 4px 3px 0; }
  .code-chip .code { font-family: var(--mono); font-weight: 700; }
  .code-chip.type-CCAM { background: #ecebfb; }

  .confidence-badge { font-size: 11px; font-weight: 700; padding: 2px 7px; border-radius: 999px; }
  .conf-high { background: var(--green-soft); color: var(--green); }
  .conf-mid { background: var(--orange-soft); color: var(--orange); }
  .conf-low { background: var(--red-soft); color: var(--red); }

  .suggestion-rule-link {
    font-family: var(--mono); font-size: 10.5px; font-weight: 700;
    color: var(--accent); background: var(--accent-soft); border: none;
    padding: 2px 7px; border-radius: 999px; cursor: pointer; flex-shrink: 0;
  }
  .suggestion-rule-link:hover { background: #dce8ff; }

  .btn { border: 1px solid var(--border); background: var(--panel); border-radius: 6px; padding: 6px 12px; font-size: 12.5px; font-weight: 600; }
  .btn:hover { background: var(--gray-soft); }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: #1d4ed8; }
  .btn-danger { color: var(--red); border-color: #f3c9c9; }
  .btn-danger:hover { background: var(--red-soft); }
  .btn-ghost { border: none; background: none; color: var(--muted); }
  .btn-ghost:hover { color: var(--text); }
  input.mini-input { border: 1px solid var(--border); border-radius: 5px; padding: 5px 8px; font-size: 12.5px; min-width: 0; }

  .removed-row { opacity: .5; text-decoration: line-through; }

  /* ---------- layout commun : dossier au centre, codage à droite ---------- */
  .A-layout { display: flex; align-items: flex-start; }
  .A-main { flex: 1 1 auto; min-width: 0; }
  .A-side {
    width: 380px; flex: 0 0 380px; background: var(--panel); border-left: 1px solid var(--border);
    height: calc(100vh - 190px); padding: 16px; position: sticky; top: 0; overflow-y: auto;
  }
  .A-side.collapsed { width: 44px; flex: 0 0 44px; padding: 16px 6px; overflow: hidden; }
  .side-collapse-toggle { border: 1px solid var(--border); background: var(--panel); border-radius: 6px; width: 28px; height: 28px; font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  .side-collapse-toggle:hover { background: var(--gray-soft); color: var(--text); }
  .A-side.collapsed .side-collapse-toggle { margin: 0 auto; display: block; }
  .A-side h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); margin-bottom: 10px; }
  .A-side section { margin-bottom: 24px; }
  .validated-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .validated-row .lib { color: var(--muted); font-size: 12px; }
  .suggestion-card { border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin-bottom: 10px; background: #fbfcfe; }
  .suggestion-card .row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .suggestion-card .code-line { font-family: var(--mono); font-weight: 700; font-size: 13px; }
  .suggestion-card .lib { font-size: 12.5px; margin-bottom: 6px; }
  .justification-box { background: var(--gray-soft); border-radius: 6px; padding: 8px; font-size: 12px; margin: 6px 0; }
  .actions-row { display: flex; gap: 6px; margin-top: 6px; }
  .add-code-row { display: flex; gap: 6px; margin-top: 8px; }
  .add-code-row input { flex: 1; }

  .source-link { display: inline-block; background: none; border: none; color: var(--accent); font-size: 11.5px; padding: 0; margin: 2px 0 6px; text-decoration: underline; cursor: pointer; }
  .source-link:hover { color: #1d4ed8; }

  @keyframes flashPulse { 0% { background-color: #fff2b8; } 100% { background-color: transparent; } }
  .flash-highlight { animation: flashPulse 1.8s ease-out; }

  /* ---------- parcours en "chemin de cases" ---------- */
  .path-h { display: flex; align-items: center; gap: 0; overflow-x: auto; padding: 18px 20px; }
  .path-box { border-radius: 12px; padding: 12px 14px; color: #fff; box-shadow: var(--shadow-sm); cursor: pointer; }
  .path-h .path-box { min-width: 150px; flex-shrink: 0; }
  .path-box .pb-icon { font-size: 16px; }
  .path-box .pb-title { font-weight: 700; font-size: 12.5px; margin-top: 4px; }
  .path-box .pb-date { font-size: 10.5px; opacity: .85; }
  .path-arrow-h { flex-shrink: 0; width: 28px; text-align: center; color: var(--muted); font-size: 16px; }
  .tab-panel .path-h { padding: 0 0 4px; }

  /* ---------- tableau de bord modulaire (bento) ---------- */
  .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; padding: 18px 20px; }
  .bento-tile { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow-sm); overflow: hidden; }
  .bento-tile.span-2 { grid-column: span 2; }
  .bento-grid.has-expanded .bento-tile { display: none; }
  .bento-grid.has-expanded .bento-tile.expanded { display: block; grid-column: 1 / -1; }
  .bento-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--gray-soft); font-weight: 700; font-size: 12.5px; }
  .bento-body { max-height: 320px; overflow-y: auto; }
  .bento-tile.expanded .bento-body { max-height: calc(100vh - 320px); }
  .bento-body .path-h { padding: 12px 14px; }
  .bento-body .tab-panel { padding: 12px 14px; }

  /* ---------- panneau de droite : onglets Codage / Chatbot ---------- */
  .side-tabs { display: flex; gap: 4px; margin-bottom: 16px; background: var(--gray-soft); border-radius: 10px; padding: 3px; }
  .side-tab { flex: 1; border: none; background: none; padding: 8px; border-radius: 8px; font-size: 12px; font-weight: 700; color: var(--muted); }
  .side-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow-sm); }

  .add-code-trigger { width: 100%; text-align: left; margin-top: 8px; border: 1px dashed var(--border); border-radius: 6px; padding: 8px 10px; color: var(--muted); background: none; }
  .add-code-trigger:hover { background: var(--gray-soft); color: var(--text); }
  .add-code-form { margin-top: 8px; border: 1px solid var(--border); border-radius: 8px; padding: 10px; display: flex; flex-direction: column; gap: 6px; background: #fbfcfe; }
  .add-code-form input.mini-input { width: 100%; }

  /* ---------- section header + pop-up "règles de détection" ---------- */
  .section-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .section-head h3 { margin-bottom: 0; }
  .rules-info-btn {
    text-transform: none; letter-spacing: normal; font-size: 11px; font-weight: 700;
    color: var(--accent); background: var(--accent-soft); border: none; border-radius: 999px;
    padding: 4px 10px; white-space: nowrap; flex-shrink: 0;
  }
  .rules-info-btn:hover { background: #dce8ff; }

  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(16,24,32,.45); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .rules-modal-panel {
    background: var(--panel); border-radius: 14px; box-shadow: var(--shadow-md);
    width: 100%; max-width: 860px; max-height: min(860px, 92vh);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 20px 24px 0; }
  .modal-header h3 { font-size: 16.5px; text-transform: none; letter-spacing: normal; color: var(--text); }
  .modal-close {
    border: none; background: var(--gray-soft); color: var(--muted);
    width: 28px; height: 28px; border-radius: 50%; font-size: 13px; flex-shrink: 0;
  }
  .modal-close:hover { background: #e2e6ea; color: var(--text); }
  .modal-sub { padding: 8px 24px 14px; color: var(--muted); font-size: 12.5px; line-height: 1.5; }
  .rules-search-wrap { position: relative; margin: 0 24px 14px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }
  .rules-search-wrap .rsw-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; color: var(--muted); pointer-events: none; }
  .rules-search-wrap input {
    width: 100%; padding: 9px 34px; border-radius: 8px; border: 1px solid var(--border);
    font-size: 13px; font-family: inherit; background: #fbfcfe;
  }
  .rules-search-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .rsw-clear {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    border: none; background: var(--gray-soft); color: var(--muted);
    width: 20px; height: 20px; border-radius: 50%; font-size: 10px; cursor: pointer;
  }
  .rsw-clear:hover { background: #e2e6ea; color: var(--text); }
  .modal-body {
    padding: 0 24px 24px; overflow-y: auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; align-content: start;
  }
  .rules-empty { grid-column: 1 / -1; color: var(--muted); font-size: 13px; text-align: center; padding: 30px 10px; }

  .rule-item { border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; background: #fbfcfe; }
  .rule-item.rule-item-focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .rule-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .rule-head-title { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .rule-id-tag {
    font-family: var(--mono); font-size: 10.5px; font-weight: 700; color: var(--muted);
    background: var(--gray-soft); padding: 2px 7px; border-radius: 999px; flex-shrink: 0;
  }
  .rule-title { font-weight: 700; font-size: 13.5px; }
  .rule-category-tag {
    font-size: 10px; text-transform: uppercase; letter-spacing: .03em; font-weight: 700;
    color: var(--accent); background: var(--accent-soft); padding: 2px 8px; border-radius: 999px; flex-shrink: 0; white-space: nowrap;
  }
  .rule-logic-box {
    font-family: var(--mono); font-size: 11.5px; line-height: 1.7; color: #1c2b36;
    background: var(--gray-soft); border-left: 3px solid var(--accent); border-radius: 6px;
    padding: 9px 11px; margin-bottom: 10px; white-space: pre-wrap;
  }
  .rule-logic-box strong { color: var(--accent); }
  textarea.rule-logic-input {
    width: 100%; min-height: 64px; margin-bottom: 4px; font-family: var(--mono); font-size: 11.5px;
    line-height: 1.6; resize: vertical;
  }
  .rule-result { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .rule-result-lib { font-size: 12px; color: var(--muted); }
  .field-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .04em; color: var(--muted); font-weight: 700; margin: 8px 0 4px; }

  .chat-msg.user { background: var(--accent); color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .chat-sources { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 7px; }

</style>

<div id="app"></div>

<script>
/* ------------------------------------------------------------------ */
/* Données mock — patients fictifs et anonymisés, chacun avec un ou      */
/* plusieurs séjours ; chaque séjour a son propre parcours/documents/    */
/* biologie/médicaments/codage.                                         */
/* ------------------------------------------------------------------ */
let PATIENTS = {};

const TYPE_META = {
  "Admission": { icon: "🚑", color: "#2563eb" },
  "Mouvement": { icon: "🔀", color: "#d97706" },
  "Acte": { icon: "🩺", color: "#7c3aed" },
  "Consultation": { icon: "👨‍⚕️", color: "#16a34a" },
  "Sortie": { icon: "🏠", color: "#0891b2" },
  "document": { icon: "📄", color: "#475569" }
};
const STATUS_COLOR = { good: "var(--green)", warn: "var(--orange)", bad: "var(--red)" };
const SERVICE_GRADIENT = {
  "Cardiologie": "linear-gradient(135deg,#2563eb,#0891b2)",
  "Chirurgie orthopédique": "linear-gradient(135deg,#7c3aed,#c026d3)",
  "Pneumologie": "linear-gradient(135deg,#16a34a,#0891b2)"
};
const SERVICE_COLOR = { "Cardiologie": "#2563eb", "Chirurgie orthopédique": "#7c3aed", "Pneumologie": "#16a34a" };
const KIND_COLOR = { parcours: "#7c3aed", document: "#475569", medicament: "#0891b2", fiche: "#0d9488", observation: "#b45309" };
const KIND_ICON = { parcours: "🧭", document: "📄", medicament: "💊", fiche: "🧾", observation: "🩺" };

/* ------------------------------------------------------------------ */
/* State (mémoire uniquement — pas de persistance)                     */
/* ------------------------------------------------------------------ */
let currentPatientId = null;
let currentSejourId = null;
let currentUser = ""; // renseigné par boot() depuis la session serveur (/api/me)
let currentUserRole = "";
let manualCodeCounter = 1;
let panelState = { editingValidatedId: null, editingSuggestionId: null };
let activeHighlight = { kind: null, id: null };
let bentoExpanded = null;
let searchState = { query: "", open: false };
let contentSearch = { query: "", open: false, scope: "sejour" };
let sidePanelTab = "codage"; // "codage" | "chatbot"
let sidePanelCollapsed = false;
let rulesModalOpen = false;
let rulesData = null;      // null = pas encore chargé (chargement à la première ouverture)
let rulesLoading = false;
let rulesEditingId = null;
let ruleCommentDrafts = {}; // { [ruleId]: brouillon de commentaire en cours }
let rulesSearchQuery = "";
let rulesFocusId = null; // dernière règle ouverte depuis une suggestion, mise en évidence dans la liste
let documentsSubTab = "documents"; // "documents" | "fiches" | "observations"
let openDocumentId = null;
let openFicheId = null;
let openObservationId = null;
let addCodeFormOpen = false;
let chatDraft = "";
let chatMessages = initialChatMessages();

function initialChatMessages() {
  return [{ from: "agent", text: "Bonjour, posez-moi une question sur ce dossier (parcours, documents, fiches, observations, biologie, médicaments).", sources: [] }];
}

function patient() { return PATIENTS[currentPatientId]; }
function sejour() { return patient().sejours[currentSejourId]; }
function docById(id) { return sejour().documents.find(d => d.id === id); }
function ficheById(id) { return sejour().fiches.find(f => f.id === id); }
function observationById(id) { return sejour().observations.find(o => o.id === id); }
function isActive(kind, id) { return activeHighlight.kind === kind && activeHighlight.id === id; }

function formatDateFr(iso) { const [y,m,d] = iso.split("-"); return `${d}/${m}/${y}`; }
function daysBetween(d1, d2) { return Math.max(1, Math.round((new Date(d2) - new Date(d1)) / 86400000)); }

function highlightTerm(text, term) {
  if (!text) return "";
  if (!term) return text;
  return text.split(term).join(`<mark>${term}</mark>`);
}
function highlightTerms(text, terms) {
  if (!text) return "";
  if (!terms || !terms.length) return text;
  return terms.reduce((acc, term) => highlightTerm(acc, term), text);
}
function highlightExcerpt(doc) { return doc ? highlightTerms(doc.excerpt, doc.highlights) : ""; }
function highlightFullText(doc) { return doc ? highlightTerms(doc.fullText || doc.excerpt, doc.highlights) : ""; }

function confClass(c) { return c >= 85 ? "conf-high" : c >= 65 ? "conf-mid" : "conf-low"; }

function vitalStatus(key, raw) {
  const n = parseFloat(raw);
  if (key === "fc") return (n < 60 || n > 100) ? "warn" : "good";
  if (key === "spo2") return n < 90 ? "bad" : n < 94 ? "warn" : "good";
  if (key === "ta") return n > 160 ? "bad" : n > 140 ? "warn" : "good";
  return "good";
}
function bioStatus(key, raw) {
  const n = parseFloat(raw);
  if (key === "ntprobnp") return n > 2000 ? "bad" : n > 900 ? "warn" : "good";
  if (key === "creat") return n > 150 ? "bad" : n > 100 ? "warn" : "good";
  if (key === "dfg") return n < 30 ? "bad" : n < 60 ? "warn" : "good";
  if (key === "crp") return n > 50 ? "bad" : n > 10 ? "warn" : "good";
  if (key === "k") return (n < 3.5 || n > 5) ? "warn" : "good";
  return "good";
}
function statusDot(status) { return `<span class="marker-dot" style="background:${STATUS_COLOR[status]}"></span>`; }

function sourceInfo(source, highlight) {
  if (source.kind === "document") {
    const doc = docById(source.id);
    return { label: `${doc.titre} (${doc.date})`,
      html: highlight ? highlightTerm(doc.excerpt, highlight) : highlightExcerpt(doc) };
  }
  if (source.kind === "fiche") {
    const f = ficheById(source.id);
    return { label: `${f.titre} (${f.date})`,
      html: f.champs.map(c => `<div><strong>${c.label} :</strong> ${c.valeur}</div>`).join("") };
  }
  if (source.kind === "observation") {
    const o = observationById(source.id);
    return { label: `Observation ${o.categorie} (${o.date})`, html: o.texte };
  }
  const ev = sejour().parcours.find(e => e.id === source.id);
  return { label: `${ev.titre} (${ev.date})`, html: ev.detail };
}

function addManualCode(code, libelle, type) {
  sejour().codesValides.push({
    id: "manual" + (manualCodeCounter++), code, libelle, type,
    date: new Date().toISOString().slice(0,10), removed: false, manuel: true
  });
}

/* ------------------------------------------------------------------ */
/* Chatbot — prototype : recherche par mots-clés dans le séjour ouvert,
   pas un vrai LLM. Sert à valider le principe d'une réponse contextuelle
   citant ses sources (documents/actes) plutôt que le mécanisme d'IA lui-même. */
/* ------------------------------------------------------------------ */
const CHAT_STOPWORDS = new Set(["le","la","les","de","des","du","un","une","est","a","et","pour","que","qui","quoi","pourquoi","comment","dans","ce","cette","quel","quelle","quels","quelles","avec","sur","au","aux","il","elle","été","patient","patiente","y","a-t-il","a-t-elle"]);

function answerChat(query) {
  const s = sejour();
  const words = query.toLowerCase().replace(/[?.,!]/g, "").split(/\s+/).filter(w => w.length > 2 && !CHAT_STOPWORDS.has(w));
  const candidates = [];
  s.documents.forEach(d => candidates.push({ kind: "document", id: d.id, label: d.titre, text: (d.titre + " " + (d.fullText || d.excerpt)).toLowerCase() }));
  s.parcours.forEach(e => candidates.push({ kind: "parcours", id: e.id, label: e.titre, text: (e.titre + " " + e.detail).toLowerCase() }));
  s.medicaments.forEach(m => candidates.push({ kind: "medicament", id: m.id, label: m.nom, text: (m.nom + " " + (m.atc || "")).toLowerCase() }));
  s.fiches.forEach(f => candidates.push({ kind: "fiche", id: f.id, label: f.titre, text: (f.titre + " " + f.champs.map(c => c.label + " " + c.valeur).join(" ")).toLowerCase() }));
  s.observations.forEach(o => candidates.push({ kind: "observation", id: o.id, label: `Observation — ${o.categorie}`, text: (o.categorie + " " + o.texte).toLowerCase() }));

  const scored = candidates
    .map(c => ({ ...c, score: words.reduce((acc, w) => acc + (c.text.includes(w) ? 1 : 0), 0) }))
    .filter(c => c.score > 0)
    .sort((a, b) => b.score - a.score);

  if (scored.length === 0) {
    return { text: `Je n'ai rien trouvé de précis dans ce séjour pour « ${query} ». Essayez un autre terme (un symptôme, un examen, un traitement…).`, sources: [] };
  }
  const top = scored.slice(0, 3);
  return { text: `D'après ce séjour, voici ce qui semble le plus pertinent pour « ${query} » :`, sources: top };
}

/* ------------------------------------------------------------------ */
/* Recherche patient + recherche de contenu (documents/actes/traitements) */
/* ------------------------------------------------------------------ */
function matchingPatients() {
  const q = searchState.query.trim().toLowerCase();
  const list = Object.values(PATIENTS);
  if (!q) return list;
  return list.filter(p => {
    const main = p.sejours[p.sejourOrder[0]];
    if (!main) return p.identity.id.toLowerCase().includes(q);
    return p.identity.id.toLowerCase().includes(q) || main.service.toLowerCase().includes(q);
  });
}

function renderSearchDropdown() {
  const matches = matchingPatients();
  if (matches.length === 0) return `<div class="search-dropdown"><div class="search-empty">Aucun patient trouvé</div></div>`;
  return `<div class="search-dropdown">
    ${matches.map(p => {
      const main = p.sejours[p.sejourOrder[0]];
      return `<div class="search-result ${p.identity.id===currentPatientId?'current':''}" data-action="select-patient" data-id="${p.identity.id}">
        <span class="sr-avatar" style="background:${main ? (SERVICE_COLOR[main.service]||'#64748b') : '#64748b'}">${p.identity.id.slice(-2)}</span>
        <div><div class="sr-title">${p.identity.id}${main ? ` — ${main.service}` : ""}</div><div class="sr-meta">${p.identity.sexe} · ${p.identity.age} ans${main ? "" : " · Aucun séjour"}</div></div>
      </div>`;
    }).join("")}
  </div>`;
}

function searchableItems(scope) {
  const p = patient();
  const sejourIds = scope === "patient" ? p.sejourOrder : [currentSejourId];
  const items = [];
  sejourIds.forEach(sid => {
    const s = p.sejours[sid];
    s.parcours.forEach(e => items.push({ sejourId: sid, kind: "parcours", id: e.id, label: e.titre, sub: e.detail, date: e.date }));
    s.documents.forEach(d => items.push({ sejourId: sid, kind: "document", id: d.id, label: d.titre, sub: d.excerpt, date: d.date }));
    s.medicaments.forEach(m => items.push({ sejourId: sid, kind: "medicament", id: m.id, label: m.nom, sub: `${m.qte} ${m.unite} · ${m.atc || ""}`, date: (m.dateAdministration || "").split(" ")[0] }));
    s.fiches.forEach(f => items.push({ sejourId: sid, kind: "fiche", id: f.id, label: f.titre, sub: f.champs.map(c => c.valeur).join(" · "), date: f.date }));
    s.observations.forEach(o => items.push({ sejourId: sid, kind: "observation", id: o.id, label: `Observation — ${o.categorie}`, sub: o.texte, date: o.date }));
  });
  return items;
}

function contentSearchMatches() {
  const q = contentSearch.query.trim().toLowerCase();
  if (!q) return [];
  return searchableItems(contentSearch.scope).filter(it =>
    it.label.toLowerCase().includes(q) || (it.sub && it.sub.toLowerCase().includes(q))
  ).slice(0, 12);
}

function renderContentSearchDropdown() {
  if (!contentSearch.query.trim()) return "";
  const matches = contentSearchMatches();
  if (matches.length === 0) return `<div class="search-dropdown"><div class="search-empty">Aucun résultat</div></div>`;
  return `<div class="search-dropdown">
    ${matches.map(it => {
      const crossSejour = contentSearch.scope === "patient" && it.sejourId !== currentSejourId;
      const sejTag = crossSejour ? ` <span class="sr-meta">(${patient().sejours[it.sejourId].service}, ${formatDateFr(it.date)})</span>` : "";
      return `<div class="search-result" data-action="goto-content-result" data-sejour="${it.sejourId}" data-kind="${it.kind}" data-id="${it.id}">
        <span class="sr-avatar" style="background:${KIND_COLOR[it.kind]}">${KIND_ICON[it.kind]}</span>
        <div><div class="sr-title">${it.label}${sejTag}</div><div class="sr-meta">${(it.sub||"").slice(0,80)}</div></div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderContentSearchWidget() {
  return `<div class="content-search-wrap">
    <span class="icon">📄</span>
    <input type="text" id="content-search-input" placeholder="Chercher un document, un acte, un traitement…" value="${contentSearch.query}" autocomplete="off">
    <div class="scope-toggle">
      <button class="scope-btn ${contentSearch.scope==='sejour'?'active':''}" data-action="set-search-scope" data-scope="sejour">Ce séjour</button>
      <button class="scope-btn ${contentSearch.scope==='patient'?'active':''}" data-action="set-search-scope" data-scope="patient">Tout le dossier</button>
    </div>
    ${contentSearch.open ? renderContentSearchDropdown() : ""}
  </div>`;
}

/* ------------------------------------------------------------------ */
/* Barre supérieure : recherches + navigation patient, bandeau séjours   */
/* ------------------------------------------------------------------ */
function renderTopBar() {
  const p = patient();
  const s = sejour();
  const grad = s ? (SERVICE_GRADIENT[s.service] || "linear-gradient(135deg,#475569,#1c2b36)") : "linear-gradient(135deg,#475569,#1c2b36)";
  const accent = s ? (SERVICE_COLOR[s.service] || "#64748b") : "#64748b";
  return `
    <div class="topbar" style="background:${grad}">
      <div class="topbar-row">
        ${renderContentSearchWidget()}
        <div class="topbar-end">
          <div class="topbar-right">
            <div class="patient-nav">
              <button class="patient-nav-btn" data-action="prev-patient" title="Patient précédent">◀</button>
              <div class="topbar-patient">
                <span class="tp-avatar">${p.identity.id.slice(-2)}</span>
                <div>
                  <div class="tp-id">${p.identity.id} <span class="tp-meta">${p.identity.sexe} · ${p.identity.age} ans</span></div>
                  <div class="tp-service">${s ? s.service : `<span class="tp-meta">Aucun séjour enregistré</span>`}</div>
                </div>
              </div>
              <button class="patient-nav-btn" data-action="next-patient" title="Patient suivant">▶</button>
            </div>
            <div class="patient-search-inline">
              <span class="psi-dot" style="background:${accent}" title="Couleur du service actuel"></span>
              <input type="text" id="patient-search-input" placeholder="Autre patient (identifiant, service…)" value="${searchState.query}" autocomplete="off">
              ${searchState.open ? renderSearchDropdown() : ""}
            </div>
          </div>
          <div class="account-badge">
            <div class="ab-info">
              <span class="ab-name">${currentUser}</span>
              <span class="ab-role">${currentUserRole === "admin" ? "Administrateur" : "Relecteur"}</span>
            </div>
            ${currentUserRole === "admin" ? `<a class="ab-btn" href="/admin.html" title="Administration">⚙</a>` : ""}
            <button class="ab-btn" data-action="switch-account" title="Changer de compte">⇄</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderSejoursBar() {
  const p = patient();
  return `<div class="sejours-bar">
    ${p.sejourOrder.map(sid => {
      const sj = p.sejours[sid];
      const active = sid === currentSejourId;
      return `<div class="sejour-card ${active?'active':''}" data-action="select-sejour" data-id="${sid}">
        <div class="sc-id">${sj.idSejour}</div>
        <div class="sc-date">${formatDateFr(sj.entree)} → ${formatDateFr(sj.sortie)}</div>
        <div class="sc-service" style="color:${SERVICE_COLOR[sj.service]||'#475569'}">${sj.service}</div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ------------------------------------------------------------------ */
/* Chemin de parcours en "cases"                                        */
/* ------------------------------------------------------------------ */
function renderParcoursPathH() {
  const items = sejour().parcours;
  return `<div class="path-h">
    ${items.map((e,i) => {
      const meta = TYPE_META[e.type];
      const arrow = i>0 ? `<div class="path-arrow-h">→</div>` : "";
      return `${arrow}<div class="path-box ${isActive('parcours',e.id)?'flash-highlight':''}" style="background:${meta.color}" data-action="goto-source" data-kind="parcours" data-id="${e.id}" data-anchor="${e.id}">
        <div class="pb-icon">${meta.icon}</div>
        <div class="pb-title">${e.titre}</div>
        <div class="pb-date">${e.date} · ${e.heure}</div>
      </div>`;
    }).join("")}
  </div>`;
}

/* ------------------------------------------------------------------ */
/* Contenu des onglets — vraies vues détaillées (Résumé / Parcours /
   Documents / Biologie / Médicaments)                                 */
/* ------------------------------------------------------------------ */
function renderMedicamentsDashboard() {
  const meds = sejour().medicaments;
  if (meds.length === 0) return `<p style="color:var(--muted);font-size:12.5px">Aucun traitement enregistré pour ce séjour.</p>`;
  const rows = [...meds].sort((a,b) => (a.dateAdministration||"").localeCompare(b.dateAdministration||""));
  return `<table class="datatable">
    <tr><th>Date d'administration</th><th>Médicament</th><th>ATC</th><th>UCD</th><th>Qté</th><th>Unité</th></tr>
    ${rows.map(m => `<tr class="${isActive('medicament',m.id)?'flash-highlight':''}" data-anchor="${m.id}">
      <td>${m.dateAdministration || ""}</td><td>${m.nom}</td><td>${m.atc || ""}</td><td>${m.ucd || ""}</td><td>${m.qte}</td><td>${m.unite}</td>
    </tr>`).join("")}
  </table>`;
}

function renderDocumentsSubTabs() {
  const tabs = [["documents", "📄", "Documents"], ["fiches", "🧾", "Fiches"], ["observations", "🩺", "Observations médicales"]];
  return `<div class="doc-subtabs">
    ${tabs.map(([key, icon, label]) => `<button class="doc-subtab ${documentsSubTab===key?'active':''}" data-action="set-documents-subtab" data-tab="${key}">${icon} ${label}</button>`).join("")}
  </div>`;
}

function renderDocumentsList() {
  const s = sejour();
  if (s.documents.length === 0) return `<p style="color:var(--muted);font-size:12.5px">Aucun document pour ce séjour.</p>`;
  return s.documents.map(d => {
    const open = openDocumentId === d.id;
    return `<div class="acc-item ${isActive('document',d.id)?'flash-highlight':''}" data-anchor="${d.id}">
      <button class="acc-header" data-action="toggle-accordion" data-kind="document" data-id="${d.id}">
        <span class="acc-caret">${open ? '▾' : '▸'}</span>
        <span class="acc-title">${d.titre}</span>
        <span class="acc-meta">${formatDateFr(d.date)} · ${d.uf}</span>
      </button>
      ${open ? `<div class="acc-body">
        <div class="doc-meta">${d.type}</div>
        <div class="doc-excerpt">${highlightFullText(d)}</div>
      </div>` : ""}
    </div>`;
  }).join("");
}

function renderFichesList() {
  const s = sejour();
  if (s.fiches.length === 0) return `<p style="color:var(--muted);font-size:12.5px">Aucune fiche enregistrée pour ce séjour.</p>`;
  return s.fiches.map(f => {
    const open = openFicheId === f.id;
    return `<div class="acc-item ${isActive('fiche',f.id)?'flash-highlight':''}" data-anchor="${f.id}">
      <button class="acc-header" data-action="toggle-accordion" data-kind="fiche" data-id="${f.id}">
        <span class="acc-caret">${open ? '▾' : '▸'}</span>
        <span class="acc-title">${f.titre}</span>
        <span class="acc-meta">${formatDateFr(f.date)} · ${f.uf}</span>
      </button>
      ${open ? `<div class="acc-body">
        <div class="doc-meta">${f.type}</div>
        <div class="fiche-form">
          ${f.champs.map(c => `<div class="fiche-field"><label>${c.label}</label><div class="fiche-value">${highlightTerms(c.valeur, f.highlights)}</div></div>`).join("")}
        </div>
      </div>` : ""}
    </div>`;
  }).join("");
}

function renderObservationsList() {
  const s = sejour();
  if (s.observations.length === 0) return `<p style="color:var(--muted);font-size:12.5px">Aucune observation médicale enregistrée pour ce séjour.</p>`;
  return s.observations.map(o => {
    const open = openObservationId === o.id;
    return `<div class="acc-item ${isActive('observation',o.id)?'flash-highlight':''}" data-anchor="${o.id}">
      <button class="acc-header" data-action="toggle-accordion" data-kind="observation" data-id="${o.id}">
        <span class="acc-caret">${open ? '▾' : '▸'}</span>
        <span class="acc-title">Observation — ${o.categorie}</span>
        <span class="acc-meta">${formatDateFr(o.date)} · ${o.uf}</span>
      </button>
      ${open ? `<div class="acc-body">
        <div class="doc-excerpt">${highlightTerms(o.texte, o.highlights)}</div>
      </div>` : ""}
    </div>`;
  }).join("");
}

function renderDocumentsSubContent() {
  if (documentsSubTab === "fiches") return renderFichesList();
  if (documentsSubTab === "observations") return renderObservationsList();
  return renderDocumentsList();
}

/* ------------------------------------------------------------------ */
/* Documents/fiches/observations hors séjour : rattachés au patient, pas   */
/* à un séjour précis — affichés dans un encart fixe, quel que soit le      */
/* séjour sélectionné.                                                      */
/* ------------------------------------------------------------------ */
function renderHorsSejourBox() {
  const hs = patient().horsSejour;
  const items = hs ? (hs[documentsSubTab] || []) : [];
  if (items.length === 0) return "";
  let body;
  if (documentsSubTab === "fiches") {
    body = items.map(f => {
      const open = openFicheId === f.id;
      return `<div class="acc-item">
        <button class="acc-header" data-action="toggle-accordion" data-kind="fiche" data-id="${f.id}">
          <span class="acc-caret">${open ? '▾' : '▸'}</span>
          <span class="acc-title">${f.titre}</span>
          <span class="acc-meta">${formatDateFr(f.date)} · ${f.uf}</span>
        </button>
        ${open ? `<div class="acc-body">
          <div class="doc-meta">${f.type}</div>
          <div class="fiche-form">
            ${f.champs.map(c => `<div class="fiche-field"><label>${c.label}</label><div class="fiche-value">${c.valeur}</div></div>`).join("")}
          </div>
        </div>` : ""}
      </div>`;
    }).join("");
  } else if (documentsSubTab === "observations") {
    body = items.map(o => {
      const open = openObservationId === o.id;
      return `<div class="acc-item">
        <button class="acc-header" data-action="toggle-accordion" data-kind="observation" data-id="${o.id}">
          <span class="acc-caret">${open ? '▾' : '▸'}</span>
          <span class="acc-title">Observation — ${o.categorie}</span>
          <span class="acc-meta">${formatDateFr(o.date)} · ${o.uf}</span>
        </button>
        ${open ? `<div class="acc-body"><div class="doc-excerpt">${o.texte}</div></div>` : ""}
      </div>`;
    }).join("");
  } else {
    body = items.map(d => {
      const open = openDocumentId === d.id;
      return `<div class="acc-item">
        <button class="acc-header" data-action="toggle-accordion" data-kind="document" data-id="${d.id}">
          <span class="acc-caret">${open ? '▾' : '▸'}</span>
          <span class="acc-title">${d.titre}</span>
          <span class="acc-meta">${formatDateFr(d.date)} · ${d.uf}</span>
        </button>
        ${open ? `<div class="acc-body">
          <div class="doc-meta">${d.type}</div>
          <div class="doc-excerpt">${d.fullText || d.excerpt}</div>
        </div>` : ""}
      </div>`;
    }).join("");
  }
  return `<div class="hors-sejour-box">
    <div class="hors-sejour-head">📌 Hors séjour <span class="hs-meta">— indépendant du séjour sélectionné</span></div>
    ${body}
  </div>`;
}

function latestBio(s, code) {
  const rows = s.biologie.filter(b => b.code === code);
  return rows.length ? rows[rows.length - 1] : null;
}

function renderTabPanel(tab) {
  const p = patient();
  const s = sejour();
  if (tab === "resume") {
    const lastC = s.constantes.length ? s.constantes[s.constantes.length-1] : null;
    const bioRows = [
      ["ntprobnp", "NT-proBNP"],
      ["dfg", "DFG"],
      ["crp", "CRP"],
    ].map(([code, label]) => [label, latestBio(s, code)]).filter(([, b]) => b);
    return `<div class="tab-panel">
      <div class="resume-grid">
        <div><span class="rg-label">Service</span><div class="rg-value">${s.service}</div></div>
        <div><span class="rg-label">Séjour</span><div class="rg-value">${formatDateFr(s.entree)} → ${formatDateFr(s.sortie)} (${daysBetween(s.entree,s.sortie)} j)</div></div>
        <div><span class="rg-label">Patient</span><div class="rg-value">${p.identity.sexe} · ${p.identity.age} ans · ${p.identity.id}</div></div>
        <div><span class="rg-label">Dossier</span><div class="rg-value">${s.documents.length} document(s) · ${new Set(s.medicaments.map(m=>m.nom)).size} traitement(s) · ${s.codesValides.filter(v=>!v.removed).length} code(s) validé(s)</div></div>
      </div>
      <h4 style="margin:16px 0 8px">Constantes &amp; biologie (dernier relevé)</h4>
      ${lastC ? `
      <div class="marker-row">${statusDot(vitalStatus('fc', lastC.fc))} FC ${lastC.fc} bpm</div>
      <div class="marker-row">${statusDot(vitalStatus('ta', lastC.ta))} TA ${lastC.ta} mmHg</div>
      <div class="marker-row">${statusDot(vitalStatus('spo2', lastC.spo2))} SpO2 ${lastC.spo2}</div>` : `<p style="color:var(--muted);font-size:12.5px">Aucune constante enregistrée pour ce séjour.</p>`}
      ${bioRows.length ? bioRows.map(([label, b]) => `<div class="marker-row">${statusDot(bioStatus(b.code, b.valeur))} ${label} ${b.valeur} ${b.unite}</div>`).join("") : `<p style="color:var(--muted);font-size:12.5px">Aucune biologie enregistrée pour ce séjour.</p>`}
      <p style="color:var(--muted);margin-top:10px">Identifiant d'étude ${p.identity.id} — dossier de recherche anonymisé.</p>
    </div>`;
  }
  if (tab === "parcours") {
    return `<div class="tab-panel">
      ${renderParcoursPathH()}
      <table class="datatable" style="margin-top:14px">
        <tr><th>Date</th><th>Type</th><th>Évènement</th><th>UF</th><th>Détail</th></tr>
        ${s.parcours.map(e => `<tr><td>${e.date} ${e.heure}</td><td>${e.type}</td><td>${e.titre}</td><td>${e.uf}</td><td style="color:var(--muted);white-space:normal">${e.detail}</td></tr>`).join("")}
      </table>
    </div>`;
  }
  if (tab === "documents") {
    return `<div class="tab-panel">
      ${renderDocumentsSubTabs()}
      ${renderHorsSejourBox()}
      ${renderDocumentsSubContent()}
    </div>`;
  }
  if (tab === "biologie") {
    return `<div class="tab-panel">
      <h4 style="margin-bottom:8px">Constantes</h4>
      <table class="datatable">
        <tr><th>Date</th><th>FC</th><th>TA</th><th>SpO2</th><th>Temp.</th><th>Poids</th></tr>
        ${s.constantes.map(c => `<tr>
          <td>${c.date}</td>
          <td>${statusDot(vitalStatus('fc',c.fc))} ${c.fc}</td>
          <td>${statusDot(vitalStatus('ta',c.ta))} ${c.ta}</td>
          <td>${statusDot(vitalStatus('spo2',c.spo2))} ${c.spo2}</td>
          <td>${c.temp}</td><td>${c.poids}</td>
        </tr>`).join("")}
      </table>
      <h4 style="margin:16px 0 8px">Biologie</h4>
      <table class="datatable">
        <tr><th>Date</th><th>Code</th><th>Valeur</th><th>Unité</th></tr>
        ${s.biologie.map(b => `<tr>
          <td>${b.date}</td>
          <td>${statusDot(bioStatus(b.code,b.valeur))} ${b.code}</td>
          <td>${b.valeur}</td><td>${b.unite}</td>
        </tr>`).join("")}
      </table>
    </div>`;
  }
  if (tab === "medicaments") {
    return `<div class="tab-panel">${renderMedicamentsDashboard()}</div>`;
  }
  return "";
}

/* ------------------------------------------------------------------ */
/* Panneau de codage — brique commune, scopée au séjour ouvert          */
/* ------------------------------------------------------------------ */
function renderRuleBadge(regleId) {
  if (!regleId) return "";
  return `<button class="suggestion-rule-link" data-action="open-rule" data-id="${regleId}"
    title="Voir la règle ${regleId} dans le dictionnaire">${regleId}</button>`;
}

function renderSuggestionCard(s) {
  if (s.status !== "pending") {
    return `<div class="suggestion-card" style="opacity:.55">
      <div class="row1">
        <span class="code-line">${s.code}</span>
        <div style="display:flex;align-items:center;gap:6px">
          ${renderRuleBadge(s.regleId)}
          <span style="font-size:12px">${s.status === "validé" ? "✅ Validé" : "❌ Rejeté"}</span>
        </div>
      </div>
      <div class="lib">${s.libelle}</div>
      <button class="btn btn-ghost" data-action="undo-suggestion" data-id="${s.id}">Annuler</button>
    </div>`;
  }
  if (panelState.editingSuggestionId === s.id) {
    return `<div class="suggestion-card">
      <div class="add-code-row">
        <input class="mini-input" id="edit-code-${s.id}" value="${s.code}">
        <input class="mini-input" id="edit-lib-${s.id}" value="${s.libelle}" style="flex:2">
      </div>
      <div class="actions-row">
        <button class="btn btn-primary" data-action="save-suggestion-edit" data-id="${s.id}">Enregistrer &amp; valider</button>
        <button class="btn" data-action="cancel-edit-suggestion" data-id="${s.id}">Annuler</button>
      </div>
    </div>`;
  }
  const src = sourceInfo(s.source, s.highlight);
  return `<div class="suggestion-card">
    <div class="row1">
      <span class="code-line">${s.code}</span>
      <div style="display:flex;align-items:center;gap:6px">
        ${renderRuleBadge(s.regleId)}
        <span class="confidence-badge ${confClass(s.confiance)}">${s.confiance}%</span>
      </div>
    </div>
    <div class="lib">${s.libelle} <span style="color:var(--muted);font-size:11px">· ${s.type}</span></div>
    <button class="source-link" data-action="goto-source" data-kind="${s.source.kind}" data-id="${s.source.id}">📎 ${src.label}</button>
    <div class="justification-box">${src.html}</div>
    <div style="font-size:11.5px;color:var(--muted)">${s.justification}</div>
    <div class="actions-row">
      <button class="btn btn-primary" data-action="validate-suggestion" data-id="${s.id}">Valider</button>
      <button class="btn" data-action="edit-suggestion" data-id="${s.id}">Modifier</button>
      <button class="btn btn-danger" data-action="reject-suggestion" data-id="${s.id}">Rejeter</button>
    </div>
  </div>`;
}

function renderValidatedRow(v) {
  if (panelState.editingValidatedId === v.id) {
    return `<div class="validated-row">
      <input class="mini-input" id="edit-vcode-${v.id}" value="${v.code}" style="width:90px">
      <input class="mini-input" id="edit-vlib-${v.id}" value="${v.libelle}" style="flex:1;margin:0 6px">
      <button class="btn btn-primary" data-action="save-validated-edit" data-id="${v.id}">OK</button>
    </div>`;
  }
  return `<div class="validated-row ${v.removed ? 'removed-row' : ''}">
    <div>
      <span class="code-chip type-${v.type}"><span class="code">${v.code}</span></span>
      <div class="lib">${v.libelle}</div>
    </div>
    ${!v.removed ? `
      <div>
        <button class="btn-ghost" data-action="edit-validated" data-id="${v.id}" title="Modifier">✎</button>
        <button class="btn-ghost" data-action="remove-validated" data-id="${v.id}" title="Retirer">🗑</button>
      </div>` : `<button class="btn-ghost" data-action="restore-validated" data-id="${v.id}">Annuler</button>`}

}

function renderAddCodeForm() {
  if (!addCodeFormOpen) {
    return `<button class="add-code-trigger" data-action="open-add-code">+ Ajouter un code</button>`;
  }
  return `<div class="add-code-form">
    <input class="mini-input" id="side-new-code" placeholder="Code (ex: R07.4)">
    <input class="mini-input" id="side-new-lib" placeholder="Libellé">
    <div class="actions-row">
      <button class="btn btn-primary" data-action="add-manual-code">Ajouter</button>
      <button class="btn" data-action="close-add-code">Annuler</button>
    </div>
  </div>`;
}

function renderCodagePanel() {
  return `
    <section>
      <h3>Codes validés (${sejour().codesValides.filter(v=>!v.removed).length})</h3>
      ${sejour().codesValides.map(renderValidatedRow).join("")}
      ${renderAddCodeForm()}
    </section>
    <section>
      <div class="section-head">
        <h3>Suggestion (${sejour().suggestions.filter(s=>s.status==='pending').length} en attente)</h3>
        <button class="rules-info-btn" data-action="open-rules-modal" title="Voir les règles et algorithmes de détection">ℹ️ Règles</button>
      </div>
      ${sejour().suggestions.map(renderSuggestionCard).join("") || `<p style="color:var(--muted);font-size:12.5px">Aucune suggestion pour ce séjour.</p>`}
    </section>`;
}

function renderChatPanel() {
  return `<div class="chat-panel">
    <p style="color:var(--muted);font-size:11px;margin-bottom:8px">Prototype — recherche par mots-clés dans le séjour ouvert, réponses avec sources cliquables.</p>
    <div class="chat-messages" id="chat-messages">
      ${chatMessages.map(m => `<div class="chat-msg ${m.from}">
        ${m.text}
        ${m.sources && m.sources.length ? `<div class="chat-sources">${m.sources.map(src => `<button class="chat-source-chip" data-action="goto-source" data-kind="${src.kind}" data-id="${src.id}">📎 ${src.label}</button>`).join("")}</div>` : ""}
      </div>`).join("")}
    </div>

      <input type="text" id="chat-input" placeholder="Poser une question sur ce dossier…" value="${chatDraft}" autocomplete="off">
      <button class="btn btn-primary" data-action="send-chat">Envoyer</button>
    </div>
  </div>`;
}

function renderSidePanelTabs() {
  return `<div class="side-tabs">
    <button class="side-tab ${sidePanelTab==='codage'?'active':''}" data-action="set-side-tab" data-tab="codage">🩺 Codage</button>
    <button class="side-tab ${sidePanelTab==='chatbot'?'active':''}" data-action="set-side-tab" data-tab="chatbot">💬 Chatbot</button>

}

function renderRightPanel() {
  return `${renderSidePanelTabs()}${sidePanelTab === "codage" ? renderCodagePanel() : renderChatPanel()}`;
}

/* ------------------------------------------------------------------ */
/* Pop-up "Règles de détection" — dictionnaire partagé entre relecteurs, */
/* purement documentaire (aucun lien avec la génération des suggestions). */
/* ------------------------------------------------------------------ */
function renderRuleLogic(logique) {
  const html = (logique || "").replace(/^(SI|ALORS|ET|OU)\b/gm, "<strong>$1</strong>");
  return `<div class="rule-logic-box">${html}</div>`;
}

function renderRuleItem(rule) {
  const editing = rulesEditingId === rule.id;
  const comments = rule.commentaires || [];
  const focusClass = rule.id === rulesFocusId ? " rule-item-focus" : "";
  return `<div class="rule-item${focusClass}" id="rule-anchor-${rule.id}">
    <div class="rule-head">
      <div class="rule-head-title">
        <span class="rule-id-tag">${rule.id}</span>
        ${editing
          ? `<input class="mini-input" id="rule-titre-${rule.id}" value="${rule.titre}" style="flex:1;font-weight:700;font-size:13.5px">`
          : `<span class="rule-title">${rule.titre}</span>`}
      </div>
      <span class="rule-category-tag">${rule.categorie}</span>
    </div>

    ${editing ? `<div class="field-label">Logique (si / alors)</div>` : ""}
    ${editing
      ? `<textarea class="rule-logic-input" id="rule-logique-${rule.id}">${rule.logique}</textarea>`
      : renderRuleLogic(rule.logique)}

    <div class="rule-result">
      <span class="code-chip type-${rule.type}"><span class="code">${rule.code}</span></span>
      <span class="rule-result-lib">${rule.libelle}</span>
    </div>

    ${editing ? `
      <div class="field-label">Explication pour le relecteur</div>
      <textarea class="rule-desc-input" id="rule-desc-${rule.id}">${rule.description}</textarea>
      <div class="actions-row">
        <button class="btn btn-primary" data-action="save-rule-edit" data-id="${rule.id}">Enregistrer</button>
        <button class="btn" data-action="cancel-edit-rule" data-id="${rule.id}">Annuler</button>
      </div>` : `
      <div class="rule-desc">${rule.description}</div>
      <button class="btn-ghost rule-edit-trigger" data-action="edit-rule" data-id="${rule.id}">✎ Modifier</button>`}

    <div class="rule-comments">
      ${comments.length
        ? comments.map(c => `
          <div class="rule-comment">
            <div class="rc-meta">${c.auteur} · ${formatDateFr(c.date.slice(0,10))}</div>
            <div>${c.texte}</div>
          </div>`).join("")
        : `<div class="rule-comment-empty">Aucun commentaire pour l'instant.</div>`}
      <div class="rule-comment-form">
        <textarea class="rule-comment-textarea" id="rule-comment-input-${rule.id}" data-rule-id="${rule.id}"
          placeholder="Ajouter un commentaire sur cette règle…">${ruleCommentDrafts[rule.id] || ""}</textarea>
        <button class="btn btn-primary" data-action="add-rule-comment" data-id="${rule.id}">Ajouter</button>
      </div>
    </div>
  </div>`;
}

function ruleMatchesSearch(rule, query) {
  const q = query.trim().toLowerCase();
  if (!q) return true;
  return (rule.code || "").toLowerCase().includes(q) || (rule.id || "").toLowerCase().includes(q);
}

function renderRulesModal() {
  if (!rulesModalOpen) return "";
  const filtered = (rulesData || []).filter(r => ruleMatchesSearch(r, rulesSearchQuery));
  const body = rulesLoading
    ? `<p style="color:var(--muted);font-size:12.5px">Chargement…</p>`
    : filtered.length
      ? filtered.map(renderRuleItem).join("")
      : `<p class="rules-empty">Aucune règle ne correspond à « ${rulesSearchQuery.trim()} ».</p>`;
  return `<div class="modal-backdrop" data-action="close-rules-modal">
    <div class="rules-modal-panel" data-action="noop">
      <div class="modal-header">
        <h3>🧠 Règles de détection des suggestions</h3>
        <button class="modal-close" data-action="close-rules-modal" title="Fermer">✕</button>
      </div>
      <p class="modal-sub">Dictionnaire partagé entre tous les relecteurs de cette instance : logique et
        mots-clés utilisés pour proposer chaque code, en langage factuel et vérifiable. Modifier une règle
        ou ajouter un commentaire est purement documentaire : ça ne met pas à jour les codes déjà suggérés.</p>
      <div class="rules-search-wrap">
        <span class="rsw-icon">🔎</span>
        <input type="text" id="rules-search-input" placeholder="Rechercher un code ou un identifiant (ex : E11, N18, RG-04)…"
          value="${rulesSearchQuery}" autocomplete="off">
        ${rulesSearchQuery ? `<button class="rsw-clear" data-action="clear-rules-search" title="Effacer">✕</button>` : ""}
      </div>
      <div class="modal-body">${body}</div>
    </div>
  </div>`;
}

/* ------------------------------------------------------------------ */
/* Navigation patient / séjour                                          */
/* ------------------------------------------------------------------ */
function resetTransientState() {
  // bentoExpanded et documentsSubTab ne sont volontairement pas réinitialisés ici :
  // on reste sur le même onglet en changeant de séjour ou de patient.
  activeHighlight = { kind: null, id: null };
  panelState = { editingValidatedId: null, editingSuggestionId: null };
  contentSearch = { query: "", open: false, scope: "sejour" };
  sidePanelTab = "codage";
  addCodeFormOpen = false;
  chatDraft = "";
  chatMessages = initialChatMessages();
  openDocumentId = null;
  openFicheId = null;
  openObservationId = null;
}

function bentoForKind(kind) {
  if (kind === "medicament") return "medicaments";
  if (kind === "document" || kind === "fiche" || kind === "observation") return "documents";
  return "parcours";
}
function syncDocumentsSubTab(kind, id) {
  if (kind === "fiche") { documentsSubTab = "fiches"; openFicheId = id; }
  else if (kind === "observation") { documentsSubTab = "observations"; openObservationId = id; }
  else if (kind === "document") { documentsSubTab = "documents"; openDocumentId = id; }
}
function switchPatient(id) {
  currentPatientId = id;
  currentSejourId = PATIENTS[id].sejourOrder[0];
  searchState = { query: "", open: false };
  resetTransientState();
  render();
}
function cyclePatient(dir) {
  const ids = Object.keys(PATIENTS);
  const idx = ids.indexOf(currentPatientId);
  switchPatient(ids[(idx + dir + ids.length) % ids.length]);
}

/* ------------------------------------------------------------------ */
/* Render dispatch                                                      */
/* ------------------------------------------------------------------ */
function render() {
  const prevBar = document.querySelector(".sejours-bar");
  const scrollLeft = prevBar ? prevBar.scrollLeft : 0;
  const body = sejour()
    ? (renderSejoursBar() + renderVariantI())
    : `<p style="padding:32px;color:var(--muted);font-size:13.5px">Aucun séjour enregistré pour ce patient.</p>`;
  document.getElementById("app").innerHTML = renderTopBar() + body + renderRulesModal();
  const newBar = document.querySelector(".sejours-bar");
  if (newBar) newBar.scrollLeft = scrollLeft;
}

/* ------------------------------------------------------------------ */
/* Événements                                                           */
/* ------------------------------------------------------------------ */
document.addEventListener("click", (ev) => {
  const el = ev.target.closest("[data-action]");
  if (!el) { return; }
  const action = el.dataset.action;
  const id = el.dataset.id;

  if (action === "prev-patient") return cyclePatient(-1);
  if (action === "next-patient") return cyclePatient(1);
  if (action === "select-patient") return switchPatient(id);
  if (action === "switch-account") return switchAccount();

  if (action === "select-sejour") {
    currentSejourId = id;
    resetTransientState();
    return render();
  }

  if (action === "select-bento") {
    bentoExpanded = el.dataset.key === "overview" ? null : el.dataset.key;
    return render();
  }

  if (action === "set-search-scope") {
    contentSearch.scope = el.dataset.scope;
    render();
    const inp = document.getElementById("content-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
    return;
  }

  if (action === "goto-content-result") {
    const sid = el.dataset.sejour;
    const kind = el.dataset.kind;
    const rid = el.dataset.id;
    if (sid !== currentSejourId) currentSejourId = sid;
    const keptScope = contentSearch.scope;
    contentSearch = { query: "", open: false, scope: keptScope };
    activeHighlight = { kind, id: rid };
    bentoExpanded = bentoForKind(kind);
    syncDocumentsSubTab(kind, rid);
    render();
    requestAnimationFrame(() => {
      const t = document.querySelector(`[data-anchor="${rid}"]`);
      if (t) t.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    return;
  }

  const suggestion = () => sejour().suggestions.find(s => s.id === id);
  if (action === "validate-suggestion") {
    const s = suggestion(); s.status = "validé";
    postAnnotation({ item_type: "suggestion", item_id: id, action: "validé", code: s.code, libelle: s.libelle, type_code: s.type });
    return render();
  }
  if (action === "reject-suggestion") {
    const s = suggestion(); s.status = "rejeté";
    postAnnotation({ item_type: "suggestion", item_id: id, action: "rejeté", code: s.code, libelle: s.libelle, type_code: s.type });
    return render();
  }
  if (action === "undo-suggestion") {
    const s = suggestion(); s.status = "pending";
    postAnnotation({ item_type: "suggestion", item_id: id, action: "annulé", code: s.code, libelle: s.libelle, type_code: s.type });
    return render();
  }
  if (action === "edit-suggestion") { panelState.editingSuggestionId = id; return render(); }
  if (action === "cancel-edit-suggestion") { panelState.editingSuggestionId = null; return render(); }
  if (action === "save-suggestion-edit") {
    const s = suggestion();
    s.code = document.getElementById(`edit-code-${id}`).value;
    s.libelle = document.getElementById(`edit-lib-${id}`).value;
    s.status = "validé"; s.amended = true;
    panelState.editingSuggestionId = null;
    postAnnotation({ item_type: "suggestion", item_id: id, action: "modifié", code: s.code, libelle: s.libelle, type_code: s.type });
    return render();
  }

  const validated = () => sejour().codesValides.find(v => v.id === id);
  if (action === "edit-validated") { panelState.editingValidatedId = id; return render(); }
  if (action === "save-validated-edit") {
    const v = validated();
    v.code = document.getElementById(`edit-vcode-${id}`).value;
    v.libelle = document.getElementById(`edit-vlib-${id}`).value;
    panelState.editingValidatedId = null;
    postAnnotation({ item_type: v.manuel ? "manuel" : "code_valide", item_id: id, action: v.manuel ? "ajouté" : "modifié", code: v.code, libelle: v.libelle, type_code: v.type });
    return render();
  }
  if (action === "remove-validated") {
    const v = validated(); v.removed = true;
    postAnnotation({ item_type: v.manuel ? "manuel" : "code_valide", item_id: id, action: "supprimé", code: v.code, libelle: v.libelle, type_code: v.type });
    return render();
  }
  if (action === "restore-validated") {
    const v = validated(); v.removed = false;
    postAnnotation({ item_type: "code_valide", item_id: id, action: "restauré", code: v.code, libelle: v.libelle, type_code: v.type });
    return render();
  }
  if (action === "open-add-code") { addCodeFormOpen = true; return render(); }
  if (action === "close-add-code") { addCodeFormOpen = false; return render(); }
  if (action === "add-manual-code") {
    const codeInput = document.getElementById("side-new-code");
    const libInput = document.getElementById("side-new-lib");
    if (codeInput.value.trim()) {
      const code = codeInput.value.trim();
      const libelle = libInput.value.trim() || "(sans libellé)";
      addManualCode(code, libelle, "CIM-10");
      const added = sejour().codesValides[sejour().codesValides.length - 1];
      postAnnotation({ item_type: "manuel", item_id: added.id, action: "ajouté", code, libelle, type_code: "CIM-10" });
    }
    addCodeFormOpen = false;
    return render();
  }

  if (action === "set-side-tab") { sidePanelTab = el.dataset.tab; return render(); }
  if (action === "toggle-side-panel") { sidePanelCollapsed = !sidePanelCollapsed; return render(); }
  if (action === "set-documents-subtab") { documentsSubTab = el.dataset.tab; return render(); }

  if (action === "open-rules-modal") {
    rulesModalOpen = true;
    rulesFocusId = null;
    if (rulesData === null && !rulesLoading) {
      rulesLoading = true;
      render();
      fetchRules().then(data => { rulesData = data; rulesLoading = false; render(); });
      return;
    }
    return render();
  }
  if (action === "open-rule") {
    rulesModalOpen = true;
    rulesFocusId = id;
    rulesSearchQuery = id;
    if (rulesData === null && !rulesLoading) {
      rulesLoading = true;
      render();
      fetchRules().then(data => { rulesData = data; rulesLoading = false; render(); });
      return;
    }
    return render();
  }
  if (action === "close-rules-modal") {
    rulesModalOpen = false; rulesEditingId = null; rulesSearchQuery = ""; rulesFocusId = null;
    return render();
  }
  if (action === "clear-rules-search") {
    rulesSearchQuery = "";
    rulesFocusId = null;
    render();
    const inp = document.getElementById("rules-search-input");
    if (inp) inp.focus();
    return;
  }
  if (action === "edit-rule") { rulesEditingId = id; return render(); }
  if (action === "cancel-edit-rule") { rulesEditingId = null; return render(); }
  if (action === "save-rule-edit") {
    const titre = document.getElementById(`rule-titre-${id}`).value.trim();
    const logique = document.getElementById(`rule-logique-${id}`).value.trim();
    const description = document.getElementById(`rule-desc-${id}`).value.trim();
    const rule = rulesData.find(r => r.id === id);
    if (rule) { rule.titre = titre; rule.logique = logique; rule.description = description; }
    rulesEditingId = null;
    fetch(`/api/rules/${encodeURIComponent(id)}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ titre, logique, description }),
    }).catch(err => console.error("Échec de mise à jour de la règle :", err));
    return render();
  }
  if (action === "add-rule-comment") {
    const texte = (ruleCommentDrafts[id] || "").trim();
    if (!texte) return;
    ruleCommentDrafts[id] = "";
    fetch(`/api/rules/${encodeURIComponent(id)}/comments`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ texte }),
    })
      .then(res => res.json())
      .then(comment => {
        const rule = rulesData.find(r => r.id === id);
        if (rule) { rule.commentaires = rule.commentaires || []; rule.commentaires.push(comment); }
        render();
      })
      .catch(err => console.error("Échec d'ajout du commentaire :", err));
    return render();
  }

  if (action === "toggle-accordion") {
    const kind = el.dataset.kind;
    const oid = el.dataset.id;
    if (kind === "document") openDocumentId = openDocumentId === oid ? null : oid;
    else if (kind === "fiche") openFicheId = openFicheId === oid ? null : oid;
    else if (kind === "observation") openObservationId = openObservationId === oid ? null : oid;
    return render();
  }

  if (action === "send-chat") {
    const text = chatDraft.trim();
    if (!text) return;
    chatMessages.push({ from: "user", text });
    const reply = answerChat(text);
    chatMessages.push({ from: "agent", text: reply.text, sources: reply.sources });
    chatDraft = "";
    render();
    const list = document.getElementById("chat-messages");
    if (list) list.scrollTop = list.scrollHeight;
    const inp = document.getElementById("chat-input");
    if (inp) inp.focus();
    return;
  }

  if (action === "goto-source") {
    activeHighlight = { kind: el.dataset.kind, id: el.dataset.id };
    bentoExpanded = bentoForKind(activeHighlight.kind);
    syncDocumentsSubTab(activeHighlight.kind, activeHighlight.id);
    render();
    requestAnimationFrame(() => {
      const t = document.querySelector(`[data-anchor="${activeHighlight.id}"]`);
      if (t) t.scrollIntoView({ behavior: "smooth", block: "center" });
    });
    return;
  }
});

document.addEventListener("click", (ev) => {
  if (searchState.open && !ev.target.closest(".patient-search-inline")) { searchState.open = false; render(); }
  if (contentSearch.open && !ev.target.closest(".content-search-wrap")) { contentSearch.open = false; render(); }
});

document.addEventListener("focusin", (ev) => {
  if (ev.target && ev.target.id === "patient-search-input" && !searchState.open) {
    searchState.open = true; render();
    const inp = document.getElementById("patient-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
  if (ev.target && ev.target.id === "content-search-input" && !contentSearch.open) {
    contentSearch.open = true; render();
    const inp = document.getElementById("content-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
});

document.addEventListener("input", (ev) => {
  if (ev.target && ev.target.id === "patient-search-input") {
    searchState.query = ev.target.value; searchState.open = true; render();
    const inp = document.getElementById("patient-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
  if (ev.target && ev.target.id === "content-search-input") {
    contentSearch.query = ev.target.value; contentSearch.open = true; render();
    const inp = document.getElementById("content-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
  if (ev.target && ev.target.id === "chat-input") {
    chatDraft = ev.target.value;
  }
  if (ev.target && ev.target.classList && ev.target.classList.contains("rule-comment-textarea")) {
    ruleCommentDrafts[ev.target.dataset.ruleId] = ev.target.value;
  }
  if (ev.target && ev.target.id === "rules-search-input") {
    rulesSearchQuery = ev.target.value;
    rulesFocusId = null;
    render();
    const inp = document.getElementById("rules-search-input");
    if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
  }
});

document.addEventListener("keydown", (ev) => {
  if (ev.target && ev.target.id === "chat-input" && ev.key === "Enter") {
    ev.preventDefault();
    const sendBtn = document.querySelector('[data-action="send-chat"]');
    if (sendBtn) sendBtn.click();
  }
  if (ev.key === "Escape" && rulesModalOpen) {
    rulesModalOpen = false;
    rulesEditingId = null;
    render();
  }
});

/* ------------------------------------------------------------------ */
/* Chargement des données depuis le backend (parquet en lecture,       */
/* CSV d'annotations propre à l'utilisateur en écriture) au lieu des    */
/* données fictives en mémoire.                                        */
/* ------------------------------------------------------------------ */
async function fetchPatientList() {
  const res = await fetch("/api/patients");
  return res.json();
}
async function fetchDossier(patientId) {
  const res = await fetch(`/api/dossier/${encodeURIComponent(patientId)}`);
  return res.json();
}
async function fetchRules() {
  const res = await fetch("/api/rules");
  return res.ok ? res.json() : [];
}
function postAnnotation(payload) {
  fetch("/api/annotate", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      patient_id: currentPatientId,
      id_sejour: currentSejourId,
      commentaire: "",
      ...payload
    })
  }).catch(err => console.error("Échec d'enregistrement de l'annotation :", err));
}

async function switchAccount() {
  await fetch("/api/logout", { method: "POST" });
  window.location.href = "/login.html";
}

async function boot() {
  const meRes = await fetch("/api/me");
  if (!meRes.ok) {
    window.location.href = "/login.html";
    return;
  }
  const me = await meRes.json();
  currentUser = me.username;
  currentUserRole = me.role;

  const ids = await fetchPatientList();
  if (ids.length === 0) {
    document.getElementById("app").innerHTML =
      `<div style="padding:48px; font-family:inherit; color:#64748b; font-size:15px;">` +
      `Aucun patient ne vous est actuellement affecté. Contactez votre administrateur.</div>`;
    return;
  }
  for (const pid of ids) {
    PATIENTS[pid] = await fetchDossier(pid);
  }
  currentPatientId = ids[0];
  currentSejourId = PATIENTS[currentPatientId].sejourOrder[0];
  render();
}

boot();
</script>
